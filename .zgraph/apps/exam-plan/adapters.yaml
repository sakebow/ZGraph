adapters:
  zbzn.exam:
    description: ZBZN exam API adapter configured outside framework code.
    base_url_env: ZBZN_BASE_URL
    headers:
      Content-Type: application/json
    auth:
      header: Authorization
      value_env: ZBZN_API_KEY
    success:
      any:
        - path: success
          equals: true
        - path: code
          in: [0, 200, "0", "200"]
        - path: status
          in: [0, 200, "0", "200"]
    error:
      message:
        first: [message, msg, error, errorMessage, detail]
    actions:
      create_bank:
        method: POST
        path: /zbzn-train/api/v1/pub/question/bank/add
        input_schema:
          type: object
          required: [bankName]
          properties:
            bankName:
              type: string
        request:
          json:
            bankName: "{{ bankName }}"
        outputs:
          bankId:
            first: [data.bankId, data.questionBankId, data.id, data]
            scalar: true
            coerce: string

      create_question:
        method: POST
        path: /zbzn-train/api/v1/pub/question/add
        normalizers:
          - path: questionType
            coerce: integer
          - path: score
            coerce: number
          - path: options.*.isCorrect
            map:
              true: 1
              false: 0
              "true": 1
              "false": 0
              "1": 1
              "0": 0
              正确: 1
              错误: 0
            on_unmatched: keep
          - path: options.*.sortOrder
            coerce: integer
        input_schema:
          type: object
          required: [bankId, content, options]
          properties:
            bankId:
              type: string
            content:
              type: string
            questionType:
              type: integer
              enum: [1, 2, 3, 4, 5]
            score:
              type: number
            options:
              type: array
              min_items: 2
              message: 单选题至少需要2个选项
              item:
                type: object
                required: [optionCode, optionContent, isCorrect, sortOrder]
                properties:
                  optionCode:
                    type: string
                  displayOptionCode:
                    type: string
                  optionContent:
                    type: string
                  isCorrect:
                    type: integer
                    enum: [0, 1]
                    message: isCorrect 必须是整数 0 或 1，不能是 true/false
                  sortOrder:
                    type: integer
        rules:
          - path: options
            exactly_one:
              where:
                path: isCorrect
                equals: 1
            message: 单选题只能有1个正确答案
        request:
          json:
            bankId: "{{ bankId }}"
            questionType: "{{ questionType }}"
            content: "{{ content }}"
            options: "{{ options }}"
            score: "{{ score }}"
        outputs:
          questionId:
            first: [data.questionId, data.bankQuestionId, data.id, data]
            scalar: true
            coerce: string

      create_paper:
        method: POST
        path: /zbzn-train/api/v1/pub/paper/add
        input_schema:
          type: object
          required: [paperName]
          properties:
            paperName:
              type: string
        request:
          json:
            paperName: "{{ paperName }}"
        outputs:
          paperId:
            first: [data.paperId, data.id, data]
            scalar: true
            coerce: string

      import_question:
        method: POST
        path: /zbzn-train/api/v1/pub/paper/question/import
        normalizers:
          - path: score
            coerce: number
          - path: sortOrder
            coerce: integer
        input_schema:
          type: object
          required: [paperId, questionId]
          properties:
            paperId:
              type: string
            questionId:
              type: string
            score:
              type: number
            sortOrder:
              type: integer
        request:
          json:
            paperId: "{{ paperId }}"
            questionList:
              - bankQuestionId: "{{ questionId }}"
                score: "{{ score }}"
                sortOrder: "{{ sortOrder }}"
        outputs:
          imported:
            value: true

      publish_paper:
        method: POST
        path: /zbzn-train/api/v1/pub/paper/status/update
        input_schema:
          type: object
          required: [paperId]
          properties:
            paperId:
              type: string
        request:
          json:
            id: "{{ paperId }}"
            paperStatus: 2
        outputs:
          published:
            value: true

      create_plan:
        method: POST
        path: /zbzn-train/api/v1/pub/exam/plan/add
        normalizers:
          - path: limitTimes
            coerce: integer
          - path: limitMinutes
            coerce: integer
          - path: targetType
            coerce: integer
        input_schema:
          type: object
          required: [examName, sourcePaperId, coverUrl, storeId, storeName]
          properties:
            examName:
              type: string
            sourcePaperId:
              type: string
            coverUrl:
              type: string
            limitTimes:
              type: integer
            limitMinutes:
              type: integer
            storeId:
              type: string
            storeName:
              type: string
            targetType:
              type: integer
        request:
          json:
            examName: "{{ examName }}"
            sourcePaperId: "{{ sourcePaperId }}"
            coverUrl: "{{ coverUrl }}"
            limitTimes: "{{ limitTimes }}"
            limitMinutes: "{{ limitMinutes }}"
            studentScopeList:
              - targetType: "{{ targetType }}"
                targetId: "{{ storeId }}"
                targetName: "{{ storeName }}"
        outputs:
          planId:
            first: [data.planId, data.examPlanId, data.id, data]
            scalar: true
            coerce: string
