runtime:
  workspace: .zgraph
  run_ttl_seconds: 86400
  allow_bash: true
  auto_approve_interrupts: true
  skills_dir: .zgraph/skills
  tokenizer_strategy: rerank

layers:
  input:
    cli: true
    completions: true
  output:
    cli_generate: true
    cli_stream: true
    completions_generate: true
    completions_stream: true
  events:
    approval: true
    interrupt: true

guardian:
  validate: true
  risk: true
  approve:
    medium: auto
    high: interrupt

policy:
  path_construction: pathlib
  file_operations_scope: current_run_workspace
  system_registry_mutation_by_agent: false
